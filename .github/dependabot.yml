version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      vite-toolchain:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
    ignore:
      - dependency-name: "vite"
        update-types:
          - "version-update:semver-major"
